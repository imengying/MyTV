version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mytv-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mytv
      - POSTGRES_USER=mytv
      - POSTGRES_PASSWORD=mytv_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mytv -d mytv']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mytv-app
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mytv:mytv_password@postgres:5432/mytv
      - DATABASE_SSL=false
      # 站长账号
      - USERNAME=admin
      # 站长密码
      - PASSWORD=admin123
      # 站点名称（可选）
      - NEXT_PUBLIC_SITE_NAME=MyTV

volumes:
  postgres-data:
